name: Post new articles to Bluesky

on:
  push:
    branches: [main]
    paths:
      - 'src/pages/posts/*.md'
  workflow_dispatch:

concurrency:
  group: feedbot

jobs:
  post-to-bluesky:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Generate cache key
        uses: actions/github-script@v8
        id: generate-key
        with:
          script: |
            core.setOutput('cache-key', new Date().valueOf())

      - name: Retrieve cache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/blueskyfeedbot
          key: feed-cache-${{ steps.generate-key.outputs.cache-key }}
          restore-keys: feed-cache-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Post new articles to Bluesky
        env:
          RSS_FEED_URL: 'https://blog.lcyou.me/rss.xml'
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          CACHE_FILE: ${{ github.workspace }}/blueskyfeedbot/cache.json
          INITIAL_POST_LIMIT: 5
        run: pnpm exec tsx scripts/post2bsky/main.ts
