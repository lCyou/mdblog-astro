name: Post new articles to Bluesky

on:
  schedule:
    - cron: '* 1 * * *'
  workflow_dispatch:

concurrency:
  group: feedbot

jobs:
  post-to-bluesky:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Restore cache
        id: cache-restore
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/blueskyfeedbot
          key: feed-cache-${{ github.run_id }}
          restore-keys: feed-cache-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Post new articles to Bluesky
        env:
          RSS_FEED_URL: 'https://blog.lcyou.me/rss.xml'
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
          CACHE_FILE: ${{ github.workspace }}/blueskyfeedbot/cache.json
          INITIAL_POST_LIMIT: 5
        run: pnpm exec tsx scripts/post2bsky/main.ts

      - name: Save cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/blueskyfeedbot
          key: feed-cache-${{ github.run_id }}
